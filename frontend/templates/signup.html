<!-- frontend/templates/signup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI Migration Agent</title>
    <link rel="stylesheet" href="/static/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card signup-card">
            <!-- Logo -->
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">🤖</span>
                    <h1>Migration Agent</h1>
                </div>
                <p class="subtitle">Create your account</p>
            </div>
            
            <!-- Signup Form -->
            <form id="signupForm" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName">
                            <i class="fas fa-user"></i>
                            Full Name
                        </label>
                        <input type="text" id="fullName" placeholder="John Doe">
                    </div>
                    
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-at"></i>
                            Username
                        </label>
                        <input type="text" id="username" placeholder="johndoe" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" placeholder="Create a strong password" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div id="strengthIndicator" class="strength-indicator"></div>
                        </div>
                        <span id="strengthText" class="strength-text">Enter a password</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-check-circle"></i>
                        Confirm Password
                    </label>
                    <div class="password-input">
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-password" onclick="toggleConfirmPasswordVisibility()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="terms">
                        <input type="checkbox" id="terms" required>
                        <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                    </label>
                </div>
                
                <button type="submit" class="signup-btn" id="signupBtn">
                    <i class="fas fa-user-plus"></i>
                    <span id="signupBtnText">Create Account</span>
                </button>
                
                <div class="divider">
                    <span>or continue with</span>
                </div>
                
                <button type="button" class="github-btn" onclick="githubLogin()">
                    <i class="fab fa-github"></i>
                    Sign up with GitHub
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="/login">Sign in</a></p>
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <div id="successMessage" class="success-message" style="display: none;"></div>
        </div>
    </div>
    
    <script src="/static/js/auth.js"></script>
    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const icon = document.querySelectorAll('.toggle-password')[0].querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }
        
        function toggleConfirmPasswordVisibility() {
            const confirmInput = document.getElementById('confirmPassword');
            const icon = document.querySelectorAll('.toggle-password')[1].querySelector('i');
            
            if (confirmInput.type === 'password') {
                confirmInput.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                confirmInput.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }
        
        function githubLogin() {
            window.location.href = '/api/auth/github/login';
        }

         // Debug - check if elements exist
    console.log('Signup page loaded!');
    console.log('Form:', document.getElementById('signupForm'));
    console.log('Button:', document.getElementById('signupBtn'));
    </script>

</body>
</html>
